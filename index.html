<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Manutenzione Skoda Kamiq</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome per le icone -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- ExcelJS per esportazione formattata e FileSaver per il download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        skoda: {
                            emerald: '#00B050',
                            dark: '#1C2C24',
                            light: '#F4F7F5',
                            gray: '#7A8B82'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap');
        body {
            font-family: 'Montserrat', sans-serif;
        }
        .skoda-gradient {
            background: linear-gradient(135deg, #1C2C24 0%, #0D1612 100%);
        }
        /* Nasconde le freccette nei campi numerici per un look più pulito */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col">

    <!-- Navbar -->
    <header class="skoda-gradient text-white shadow-md border-b-4 border-skoda-emerald">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <!-- Ricerca automatica del tuo file miologo.png. Se fallisce, mostra il fallback-logo -->
                <img src="miologo.png" alt="Logo Skoda" class="w-24 h-auto object-contain" onerror="this.style.display='none'; document.getElementById('fallback-logo').style.display='block';">
                
                <!-- Fallback SVG di emergenza -->
                <div id="fallback-logo" class="hidden">
                    <svg class="w-12 h-12 text-skoda-emerald" viewBox="0 0 100 100" fill="currentColor">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="6"/>
                        <circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="5 3"/>
                        <path d="M50 20 L65 45 L53 42 L50 80 L47 42 L35 45 Z" fill="currentColor"/>
                    </svg>
                </div>

                <div>
                    <h1 class="text-xl font-extrabold tracking-wider"><span class="text-skoda-emerald">KAMIQ</span></h1>
                    <p class="text-xs text-gray-400 font-semibold uppercase tracking-widest">Registro Manutenzione Ufficiale</p>
                </div>
            </div>
            <div class="flex gap-2 print:hidden">
                <button onclick="esportaExcel()" class="bg-skoda-emerald hover:bg-emerald-600 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition duration-200 shadow-md text-sm">
                    <i class="fa-solid fa-file-excel"></i> Esporta Excel formattato
                </button>
                <button onclick="window.print()" class="bg-transparent hover:bg-white/10 border border-white/30 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition duration-200 text-sm">
                    <i class="fa-solid fa-print"></i> Stampa PDF
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-6 space-y-6">
        
        <!-- SEZIONE 1: DATI DEL VEICOLO (Salvataggio automatico ad ogni modifica) -->
        <section class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="bg-skoda-dark px-6 py-4 border-b border-gray-800 flex justify-between items-center">
                <h2 class="text-white font-bold tracking-wide flex items-center gap-2">
                    <i class="fa-solid fa-car text-skoda-emerald"></i> CARATTERISTICHE DEL VEICOLO
                </h2>
                <span class="text-xs text-skoda-emerald font-semibold bg-skoda-emerald/10 px-3 py-1 rounded-full border border-skoda-emerald/20">
                    <i class="fa-solid fa-floppy-disk mr-1"></i> Salvataggio auto
                </span>
            </div>
            
            <div class="p-6 grid grid-cols-1 md:grid-cols-4 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Nome Proprietario</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-user"></i></span>
                        <input type="text" id="ownerName" oninput="salvaDatiVeicolo()" placeholder="Es. Mario Rossi" class="w-full pl-10 pr-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-skoda-emerald font-semibold text-gray-700 transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Targa Veicolo</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-id-card"></i></span>
                        <input type="text" id="plateNumber" oninput="salvaDatiVeicolo()" placeholder="Es. AB 123 CD" class="w-full pl-10 pr-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-skoda-emerald font-semibold text-gray-700 uppercase tracking-wider transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Codice VIN (Telaio)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-fingerprint"></i></span>
                        <input type="text" id="vinCode" oninput="salvaDatiVeicolo()" placeholder="Es. TMB..." class="w-full pl-10 pr-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-skoda-emerald font-mono text-sm text-gray-700 uppercase tracking-widest transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Data Immatricolazione</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fa-solid fa-calendar-check"></i></span>
                        <input type="date" id="regDate" onchange="salvaDatiVeicolo()" class="w-full pl-10 pr-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-skoda-emerald font-semibold text-gray-700 transition">
                    </div>
                </div>
            </div>
        </section>

        <!-- KPI veloci -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Chilometri Attuali</p>
                    <h3 id="kpi-km" class="text-2xl font-black text-gray-800 mt-1">0 Km</h3>
                </div>
                <div class="w-12 h-12 rounded-full bg-skoda-emerald/10 flex items-center justify-center text-skoda-emerald text-xl"><i class="fa-solid fa-gauge-high"></i></div>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Totale Interventi</p>
                    <h3 id="kpi-count" class="text-2xl font-black text-gray-800 mt-1">0</h3>
                </div>
                <div class="w-12 h-12 rounded-full bg-skoda-emerald/10 flex items-center justify-center text-skoda-emerald text-xl"><i class="fa-solid fa-wrench"></i></div>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Ultimo Intervento</p>
                    <h3 id="kpi-last-date" class="text-xl font-bold text-gray-800 mt-1">N/D</h3>
                </div>
                <div class="w-12 h-12 rounded-full bg-skoda-emerald/10 flex items-center justify-center text-skoda-emerald text-xl"><i class="fa-solid fa-calendar-day"></i></div>
            </div>
        </div>

        <!-- SEZIONE 2: INSERIMENTO NUOVO INTERVENTO -->
        <section class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 print:hidden">
            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-plus-circle text-skoda-emerald"></i> Registra un Nuovo Intervento
            </h3>
            <form id="maintenanceForm" onsubmit="aggiungiRiga(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Data Intervento</label>
                    <input type="date" id="newDate" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-skoda-emerald outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Chilometraggio (Km)</label>
                    <input type="number" id="newKm" required min="0" placeholder="Es. 35000" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-skoda-emerald outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Descrizione Lavori / Note</label>
                    <input type="text" id="newDesc" required placeholder="Es. Cambio Olio, Filtro Abitacolo..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-skoda-emerald outline-none">
                </div>
                <div>
                    <button type="submit" class="w-full bg-skoda-emerald hover:bg-emerald-600 text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-200 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-circle-plus"></i> Aggiungi al registro
                    </button>
                </div>
            </form>
        </section>

        <!-- SEZIONE 3: TABELLA DELLE MANUTENZIONI -->
        <section class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="px-6 py-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center flex-wrap gap-2">
                <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <i class="fa-solid fa-table-list text-skoda-emerald"></i> Cronologia Manutenzione
                </h3>
            </div>
            
            <div class="overflow-x-auto">
                <table id="maintenanceTable" class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-skoda-dark text-white uppercase text-xs tracking-wider">
                            <th class="py-4 px-6 font-bold w-48">Data</th>
                            <th class="py-4 px-6 font-bold w-48">Km</th>
                            <th class="py-4 px-6 font-bold">Descrizione</th>
                            <th class="py-4 px-6 font-bold text-center w-24 print:hidden">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-200">
                        <!-- Righe popolate da JS -->
                    </tbody>
                </table>
            </div>
            
            <div id="emptyState" class="hidden py-12 text-center text-gray-400">
                <i class="fa-solid fa-folder-open text-5xl mb-3"></i>
                <p class="font-medium text-lg">Nessun intervento registrato.</p>
            </div>
        </section>
        
    </main>

    <!-- Toast Notification Custom -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 transform translate-y-20 opacity-0 transition duration-300 ease-out z-50">
        <i class="fa-solid fa-circle-check text-skoda-emerald text-lg"></i>
        <span id="toastMsg" class="font-semibold text-sm">Messaggio</span>
    </div>

    <script>
        // --- 1. GESTIONE DATI LOCALI (LocalStorage) ---
        let interventi = JSON.parse(localStorage.getItem('kamiq_interventi_v2'));
        
        if (!interventi) {
            interventi = []; // Inizia vuoto per il vero utente
            salvaInterventi();
        }

        function salvaInterventi() {
            localStorage.setItem('kamiq_interventi_v2', JSON.stringify(interventi));
        }

        function salvaDatiVeicolo() {
            const data = {
                owner: document.getElementById('ownerName').value,
                plate: document.getElementById('plateNumber').value,
                vin: document.getElementById('vinCode').value,
                regDate: document.getElementById('regDate').value
            };
            localStorage.setItem('kamiq_veicolo_v2', JSON.stringify(data));
        }

        function caricaDatiVeicolo() {
            const data = JSON.parse(localStorage.getItem('kamiq_veicolo_v2'));
            if (data) {
                if(data.owner) document.getElementById('ownerName').value = data.owner;
                if(data.plate) document.getElementById('plateNumber').value = data.plate;
                if(data.vin) document.getElementById('vinCode').value = data.vin;
                if(data.regDate) document.getElementById('regDate').value = data.regDate;
            }
        }

        // --- 2. INIZIALIZZAZIONE ---
        window.onload = function() {
            caricaDatiVeicolo();
            renderTabella();
            document.getElementById('newDate').valueAsDate = new Date();
        };

        // --- 3. LOGICA TABELLA E INTERVENTI ---
        function renderTabella() {
            const tableBody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            
            interventi.sort((a, b) => new Date(b.data) - new Date(a.data));

            if (interventi.length === 0) {
                tableBody.innerHTML = '';
                emptyState.classList.remove('hidden');
                aggiornaKPIs(0, 0, "N/D");
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            let html = '';
            interventi.forEach(item => {
                html += `
                    <tr class="hover:bg-skoda-light/50 transition">
                        <td class="py-4 px-6 font-semibold text-gray-700 whitespace-nowrap">
                            <i class="fa-solid fa-calendar-day text-skoda-emerald/70 mr-2"></i> ${formatDate(item.data)}
                        </td>
                        <td class="py-4 px-6 font-mono font-bold text-gray-800 whitespace-nowrap">
                            ${parseInt(item.km).toLocaleString('it-IT')} Km
                        </td>
                        <td class="py-4 px-6 text-gray-600 font-medium">${item.descrizione}</td>
                        <td class="py-4 px-6 text-center whitespace-nowrap print:hidden">
                            <button onclick="eliminaRiga(${item.id})" class="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded-full transition duration-150">
                                <i class="fa-regular fa-trash-can text-lg"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            tableBody.innerHTML = html;
            
            const maxKm = interventi.length > 0 ? Math.max(...interventi.map(i => parseInt(i.km))) : 0;
            const piuRecente = interventi[0] ? formatDate(interventi[0].data) : "N/D";
            aggiornaKPIs(maxKm, interventi.length, piuRecente);
        }

        function aggiornaKPIs(maxKm, count, lastDate) {
            document.getElementById('kpi-km').innerText = maxKm > 0 ? `${maxKm.toLocaleString('it-IT')} Km` : '0 Km';
            document.getElementById('kpi-count').innerText = count;
            document.getElementById('kpi-last-date').innerText = lastDate;
        }

        function aggiungiRiga(event) {
            event.preventDefault();
            const dateVal = document.getElementById('newDate').value;
            const kmVal = parseInt(document.getElementById('newKm').value);
            const descVal = document.getElementById('newDesc').value.trim();

            if (!dateVal || isNaN(kmVal) || !descVal) {
                mostraToast("Compila tutti i campi!");
                return;
            }

            interventi.push({ id: Date.now(), data: dateVal, km: kmVal, descrizione: descVal });
            salvaInterventi();
            renderTabella();

            document.getElementById('newKm').value = '';
            document.getElementById('newDesc').value = '';
            mostraToast("Intervento salvato!");
        }

        function eliminaRiga(id) {
            interventi = interventi.filter(i => i.id !== id);
            salvaInterventi();
            renderTabella();
            mostraToast("Intervento rimosso");
        }

        function formatDate(dateString) {
            const p = dateString.split('-');
            if (p.length !== 3) return dateString;
            return `${p[2]}/${p[1]}/${p[0]}`;
        }

        function mostraToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        // --- 4. ESPORTAZIONE EXCELJS FORMATTATA E GRAFICA ---
        async function esportaExcel() {
            try {
                const owner = document.getElementById('ownerName').value || "N/D";
                const plate = document.getElementById('plateNumber').value.toUpperCase() || "N/D";
                const vin = document.getElementById('vinCode').value.toUpperCase() || "N/D";
                const regDate = document.getElementById('regDate').value ? formatDate(document.getElementById('regDate').value) : "N/D";

                // Creazione Workbook e Foglio
                const wb = new ExcelJS.Workbook();
                const ws = wb.addWorksheet('Manutenzione', {views: [{showGridLines: false}]});

                // --- STILI GLOBALI ---
                const skodaDark = '1C2C24';
                const skodaEmerald = '00B050';
                
                // Intestazione Principale
                ws.mergeCells('A1:C1');
                const titleCell = ws.getCell('A1');
                titleCell.value = 'ŠKODA KAMIQ - REGISTRO MANUTENZIONE UFFICIALE';
                titleCell.font = { name: 'Arial', size: 14, bold: true, color: { argb: 'FFFFFFFF' } };
                titleCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: skodaDark } };
                titleCell.alignment = { vertical: 'middle', horizontal: 'center' };

                ws.mergeCells('A2:C2');
                ws.getCell('A2').value = 'Dati Veicolo e Storico Interventi';
                ws.getCell('A2').font = { name: 'Arial', size: 10, italic: true, color: { argb: 'FF555555' } };
                ws.getCell('A2').alignment = { vertical: 'middle', horizontal: 'center' };
                ws.addRow([]); // Riga vuota 3

                // Dati Veicolo Box
                ws.getCell('A4').value = 'Proprietario:';
                ws.getCell('B4').value = owner;
                ws.getCell('A5').value = 'Targa:';
                ws.getCell('B5').value = plate;
                ws.getCell('A6').value = 'Telaio (VIN):';
                ws.getCell('B6').value = vin;
                ws.getCell('A7').value = 'Immatricolazione:';
                ws.getCell('B7').value = regDate;

                // Stile Box Veicolo
                for(let i=4; i<=7; i++) {
                    ws.getCell(`A${i}`).font = { bold: true, color: { argb: skodaDark } };
                    ws.getCell(`B${i}`).font = { bold: true };
                }
                ws.addRow([]); // Riga vuota 8

                // Header Tabella Interventi
                const headerRow = ws.addRow(['Data Intervento', 'Chilometraggio (Km)', 'Descrizione Lavori Svolti']);
                headerRow.eachCell((cell) => {
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: skodaEmerald } };
                    cell.font = { color: { argb: 'FFFFFFFF' }, bold: true };
                    cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    cell.border = {
                        top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'}
                    };
                });

                // Aggiunta Dati (Ordinati temporalmente)
                const interventiInOrdine = [...interventi].sort((a,b) => new Date(a.data) - new Date(b.data));
                
                interventiInOrdine.forEach((item, index) => {
                    const row = ws.addRow([formatDate(item.data), item.km, item.descrizione]);
                    
                    row.eachCell((cell, colNumber) => {
                        cell.border = { top: {style:'thin', color: {argb:'FFE2E8F0'}}, bottom: {style:'thin', color: {argb:'FFE2E8F0'}} };
                        cell.alignment = { vertical: 'middle', horizontal: colNumber === 3 ? 'left' : 'center' };
                        // Effetto zebra
                        if (index % 2 === 0) {
                            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8FAFC' } };
                        }
                    });
                    
                    // Formato numero colonna km
                    row.getCell(2).numFmt = '#,##0 "Km"';
                });

                // Larghezza Colonne
                ws.getColumn(1).width = 20; // Data
                ws.getColumn(2).width = 25; // Km
                ws.getColumn(3).width = 65; // Descrizione

                // Salvataggio tramite FileSaver
                const buffer = await wb.xlsx.writeBuffer();
                const nomeFile = `Skoda_Kamiq_${plate.replace(/\s+/g, '')}.xlsx`;
                saveAs(new Blob([buffer]), nomeFile);
                
                mostraToast("File Excel scaricato con successo!");

            } catch (error) {
                console.error("Errore export Excel:", error);
                mostraToast("Errore durante l'esportazione");
            }
        }
    </script>
</body>
</html>
